<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Artist Link Hub</title>
    <meta name="description" content="A simple artist link hub for music and social platforms.">
    <meta name="theme-color" content="#000000">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Artist Link Hub">
    <meta property="og:description" content="A simple artist link hub for music and social platforms.">
    <meta property="og:image" content="">
    <meta property="og:url" content="">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Artist Link Hub">
    <meta name="twitter:description" content="A simple artist link hub for music and social platforms.">
    <meta name="twitter:image" content="">
    <style>
      :root {
        --bg: #000000;
        --text: #f4efe8;
        --muted: #82882d;
        --accent: #41209f;
        --radius: 0.5rem;
        --font-display: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
        --font-body: "Arial Narrow", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        cursor: grabbing;
        overflow-x: hidden;
      }

      .page {
        position: relative;
        z-index: 1;
        width: min(100%, 960px);
        margin: 0 auto;
        padding: 48px 20px 64px;
      }

      .shell {
        display: grid;
        justify-items: center;
        gap: 40px;
        text-align: center;
        margin-top: 40px;
      }

      .logo {
        width: min(100%, 820px);
        height: auto;
        display: block;
      }

      .tagline {
        margin: -8px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
        text-transform: uppercase;
        transform: scaleX(0.82) scaleY(1.5);
        transform-origin: center;
      }

      .tagline-word {
        display: inline-block;
        letter-spacing: -0.075em;
      }

      .tagline-space {
        display: inline-block;
        width: 0.42em;
      }

      .player-wrap {
        width: min(100%, 200px);
        display: grid;
        gap: 0;
        padding: 12px;
        border: 0;
        border-radius: var(--radius);
        background: #000000;
      }

      .player-wrap[hidden] {
        display: none;
      }

      .player-item {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
      }

      .player-frame-wrap {
        position: relative;
        flex: 0 0 42px;
        width: 42px;
        height: 42px;
        background: #000000;
        overflow: hidden;
      }

      .player-frame-overlay {
        position: absolute;
        inset: 0;
        background: #505f32;
        pointer-events: none;
        mix-blend-mode: color-burn;
        border: 1px solid #f3ff47;
      }

      .player-frame {
        width: 100%;
        height: 120px;
        border: 0;
        background: #000000;
      }

      .player-label {
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1;
        text-transform: uppercase;
        white-space: nowrap;
        transform: scaleX(0.82) scaleY(1.5);
        transform-origin: left center;
      }

      .player-placeholder {
        width: 100%;
        padding: 1rem 0;
        color: var(--muted);
        font-size: 0.9rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        transform: scaleY(1.2);
        transform-origin: center;
      }

      .links {
        display: grid;
        gap: 14px;
        justify-items: center;
      }

      .link-item {
        color: var(--accent);
        text-decoration: none;
        font-family: var(--font-display);
        font-size: 2.8rem;
        line-height: 1;
        letter-spacing: var(--link-spacing, 0.08em);
        text-transform: uppercase;
        transform: scaleY(.5);
        transform-origin: center;
        transition: opacity 140ms ease, transform 140ms ease;
        will-change: transform;
      }

      .link-item:hover,
      .link-item:focus-visible {
        opacity: 0.78;
        transform: translateY(-1px) scaleY(1.2);
      }

      .empty-state {
        color: var(--muted);
        font-size: 0.95rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        transform: scaleY(1.2);
        transform-origin: center;
      }

      @media (max-width: 640px) {
        .page {
          padding: 36px 16px 48px;
        }

        .shell {
          gap: 22px;
        }

        .tagline {
          font-size: 0.8rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="shell">
        <img class="logo" id="logo" src="./util_skelly_yellow_purple_1.jpg" alt="Artist logo">

        <!-- <div class="tagline" id="tagline">Bäss Müsik Producer</div> -->

        <section class="player-wrap" id="player-wrap" aria-label="Music player" hidden>
          <div class="player-placeholder" id="player-placeholder"></div>
        </section>

        <nav class="links" id="link-list" aria-label="Artist links"></nav>
      </div>
    </main>

    <script src="./site-config.js"></script>
    <script>
      (function () {
        const config = {
          artistName: "Artist Name",
          pageTitle: "",
          pageDescription: "",
          tagline: "",
          logoUrl: "./util_logo_orange_transparent.png",
          musicEmbedUrl: "",
          musicEmbeds: [],
          siteUrl: "",
          links: [],
          ...(window.SITE_CONFIG || {})
        };
        const logo = document.getElementById("logo");
        const tagline = document.getElementById("tagline");
        const playerWrap = document.getElementById("player-wrap");
        const playerPlaceholder = document.getElementById("player-placeholder");
        const linkList = document.getElementById("link-list");

        function renderPlayer(url, embeds) {
          const embedItems = Array.isArray(embeds) ? embeds.filter((item) => item?.src?.trim()) : [];

          if (!embedItems.length && !url) {
            playerWrap.hidden = true;
            return;
          }

          playerPlaceholder.remove();
          playerWrap.hidden = false;

          (embedItems.length ? embedItems : [{ src: url, title: "Embedded music player" }]).forEach(function (item, index) {
            const playerItem = document.createElement("div");
            playerItem.className = "player-item";
            playerItem.style.marginLeft = `${index*42}px`;

            const frameWrap = document.createElement("div");
            frameWrap.className = "player-frame-wrap";

            const frame = document.createElement("iframe");
            frame.className = "player-frame";
            frame.src = item.src;
            frame.title =
              item.title || "Embedded music player " + String(index + 1);
            frame.loading = "lazy";
            frame.allow =
              "autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture";

            if (item.style) {
              frame.style.cssText = item.style;
            }

            if (item.seamless) {
              frame.setAttribute("seamless", "");
            }

            const overlay = document.createElement("div");
            overlay.className = "player-frame-overlay";
            if (index === 1) {
              overlay.style.setProperty("background", "#aac91b", "important");
              overlay.style.setProperty("mix-blend-mode", "difference", "important");
              overlay.style.setProperty("border-color", "#8a8f30", "important");
            }

            const label = document.createElement("span");
            label.className = "player-label";
            label.textContent = item.label || (item.title ? String(item.title).replace(/\s+by\s+.+$/i, "") : "Track " + String(index + 1));

            frameWrap.appendChild(frame);
            frameWrap.appendChild(overlay);
            playerItem.appendChild(frameWrap);
            playerItem.appendChild(label);
            playerWrap.appendChild(playerItem);
          });
        }

        function renderTagline(text) {
          tagline.replaceChildren();

          if (!text) {
            tagline.hidden = true;
            return;
          }

          tagline.hidden = false;
          String(text)
            .trim()
            .split(/\s+/)
            .forEach(function (word, index, words) {
              const wordSpan = document.createElement("span");
              wordSpan.className = "tagline-word";
              wordSpan.textContent = word;
              tagline.appendChild(wordSpan);

              if (index < words.length - 1) {
                const spacer = document.createElement("span");
                spacer.className = "tagline-space";
                spacer.setAttribute("aria-hidden", "true");
                spacer.textContent = " ";
                tagline.appendChild(spacer);
              }
            });
        }

        function renderLinks(items) {
          linkList.replaceChildren();

          const validLinks = Array.isArray(items) ? items.filter((item) => item?.label && item?.url?.trim()) : [];

          if (!validLinks.length) {
            const empty = document.createElement("div");
            empty.className = "empty-state";
            empty.textContent = "Add platform links in site-config.js.";
            linkList.appendChild(empty);
            return;
          }

          const widestSpacing = 0.34;
          const narrowestSpacing = 0.08;
          const spacingRange = widestSpacing - narrowestSpacing;
          const lastIndex = Math.max(validLinks.length - 1, 1);

          validLinks.forEach(function (item, index) {
            const link = document.createElement("a");
            const progress = index / lastIndex;
            const spacing = widestSpacing - spacingRange * progress;

            link.className = "link-item";
            link.href = item.url;
            link.target = "_blank";
            link.rel = "noreferrer";
            link.textContent = item.label;
            link.setAttribute("aria-label", item.label);
            link.dataset.label = item.label;
            link.style.setProperty("--link-spacing", spacing.toFixed(3) + "em");
            linkList.appendChild(link);
          });
        }

        function attachCorruptionEffect() {
          const scrambleChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

          linkList.querySelectorAll(".link-item").forEach(function (link) {
            let activeTimer = null;
            let settleTimer = null;

            function resetLabel() {
              window.clearInterval(activeTimer);
              window.clearTimeout(settleTimer);
              activeTimer = null;
              settleTimer = null;
              link.textContent = link.dataset.label || link.textContent;
            }

            function startCorruption() {
              const original = link.dataset.label || link.textContent;
              let frame = 0;

              resetLabel();

              activeTimer = window.setInterval(function () {
                const revealCount = Math.floor(frame * 1.75);
                const scrambled = original
                  .split("")
                  .map(function (char, index) {
                    if (char === " ") {
                      return " ";
                    }

                    if (index < revealCount) {
                      return original.charAt(index);
                    }

                    if (Math.random() < 0.45) {
                      return original.charAt(index);
                    }

                    return scrambleChars.charAt(
                      Math.floor(Math.random() * scrambleChars.length)
                    );
                  })
                  .join("");

                link.textContent = scrambled;
                frame += 1;

                if (revealCount >= original.length) {
                  resetLabel();
                }
              }, 36);

              settleTimer = window.setTimeout(resetLabel, 220);
            }

            link.addEventListener("mouseenter", startCorruption);
            link.addEventListener("focus", startCorruption);
            link.addEventListener("mouseleave", resetLabel);
            link.addEventListener("blur", resetLabel);
          });
        }

        const artistName = config.artistName;
        const pageTitle = config.pageTitle || artistName;
        const pageDescription = config.pageDescription || config.tagline || "";
        const taglineText = config.tagline || "Bäss Müsik Producer";

        document.title = pageTitle;
        logo.src = config.logoUrl;
        logo.alt = artistName + " logo";
        // renderTagline(taglineText);

        renderPlayer(config.musicEmbedUrl, config.musicEmbeds);
        renderLinks(config.links);
        attachCorruptionEffect();

        [
          ['meta[name="description"]', pageDescription],
          ['meta[property="og:title"]', pageTitle],
          ['meta[property="og:description"]', pageDescription],
          ['meta[property="og:image"]', config.logoUrl],
          ['meta[property="og:url"]', config.siteUrl],
          ['meta[name="twitter:title"]', pageTitle],
          ['meta[name="twitter:description"]', pageDescription],
          ['meta[name="twitter:image"]', config.logoUrl]
        ].forEach(function ([selector, value]) {
          if (value) {
            document.querySelector(selector)?.setAttribute("content", value);
          }
        });
      })();
    </script>
  </body>
</html>
